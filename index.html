<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workout" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="icon" href="./icon-192.png" />
  <title>Workout</title>
  <style>
    :root {
      --bg: #050505;
      --bg-raised: #0d0d0d;
      --panel: #141414;
      --panel-hi: #1c1c1c;
      --border: #222;
      --border-hi: #2e2e2e;
      --text: #f5f5f5;
      --muted: #8a8a8a;
      --accent: #10b981;
      --danger: #ef4444;
      --radius: 16px;
      --body-base: #181818;
      --body-stroke: #2a2a2a;
      --muscle-dim: #242424;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.4;
      overscroll-behavior-y: contain;
      -webkit-font-smoothing: antialiased;
    }
    body {
      min-height: 100dvh;
      min-height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      position: relative;
      overflow-x: hidden;
    }

    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse 120% 60% at 50% -10%,
        color-mix(in oklab, var(--accent) 25%, transparent) 0%, transparent 60%);
      transition: background 300ms ease, opacity 300ms ease;
    }
    .ambient.dim { opacity: 0.45; }

    .app {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 16px 16px 120px;
    }
    .hidden { display: none !important; }

    /* ---------- Home ---------- */
    .app-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin: 16px 4px 24px;
    }
    .app-title {
      font-size: 13px;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 700;
    }
    .last-session { font-size: 12px; color: var(--muted); }
    .last-session .dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; margin-right: 6px; transform: translateY(-1px);
    }

    .tiles { display: flex; flex-direction: column; gap: 14px; }
    .tile {
      --tile-accent: var(--accent);
      position: relative;
      display: flex; align-items: center; gap: 18px;
      width: 100%;
      background:
        linear-gradient(135deg,
          color-mix(in oklab, var(--tile-accent) 16%, var(--panel)) 0%,
          var(--panel) 60%);
      border: 1px solid color-mix(in oklab, var(--tile-accent) 30%, var(--border));
      border-radius: var(--radius);
      padding: 22px 20px;
      color: var(--text);
      text-align: left;
      font: inherit;
      cursor: pointer;
      overflow: hidden;
      transition: transform 80ms ease, border-color 150ms ease;
    }
    .tile::before {
      content: "";
      position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      background: var(--tile-accent);
      box-shadow: 0 0 24px 2px color-mix(in oklab, var(--tile-accent) 60%, transparent);
    }
    .tile::after {
      content: ""; position: absolute; right: -40px; top: -40px;
      width: 140px; height: 140px; border-radius: 50%;
      background: radial-gradient(circle,
        color-mix(in oklab, var(--tile-accent) 38%, transparent) 0%, transparent 70%);
      pointer-events: none;
    }
    .tile:active { transform: scale(0.992); }
    .tile-silhouette { flex-shrink: 0; width: 62px; height: 88px; color: var(--tile-accent); }
    .tile-copy { flex: 1; min-width: 0; }
    .tile-name { font-size: 26px; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase; }
    .tile-meta {
      margin-top: 4px; font-size: 12px; color: var(--muted);
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .tile-arrow {
      flex-shrink: 0; font-size: 22px;
      color: color-mix(in oklab, var(--tile-accent) 70%, var(--muted));
      opacity: 0.8;
    }

    /* ---------- Detail ---------- */
    .detail-header { display: flex; align-items: center; gap: 12px; margin: 4px 0 8px; }
    .back-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      width: 44px; height: 44px; border-radius: 12px;
      font-size: 22px; cursor: pointer;
      display: grid; place-items: center;
      transition: background 120ms ease;
    }
    .back-btn:active { background: var(--panel-hi); }
    .detail-title {
      font-size: 24px; font-weight: 900; text-transform: uppercase;
      letter-spacing: 0.06em; flex: 1;
    }

    .progress-ring { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
    .progress-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .progress-ring .track { stroke: var(--border); }
    .progress-ring .fill {
      stroke: var(--accent);
      transition: stroke-dashoffset 280ms cubic-bezier(.4,0,.2,1);
      filter: drop-shadow(0 0 4px color-mix(in oklab, var(--accent) 50%, transparent));
    }
    .progress-ring .label {
      position: absolute; inset: 0; display: grid; place-items: center;
      font-size: 11px; font-weight: 700; color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .progress-ring.complete .label { color: var(--accent); }

    /* Hero */
    .detail-hero {
      margin: 20px 0 4px;
      padding: 22px 20px;
      background:
        linear-gradient(135deg,
          color-mix(in oklab, var(--accent) 18%, var(--panel)) 0%,
          var(--panel) 70%);
      border: 1px solid color-mix(in oklab, var(--accent) 30%, var(--border));
      border-radius: var(--radius);
      display: flex; align-items: center; gap: 16px;
      overflow: hidden; position: relative;
    }
    .detail-hero::after {
      content: ""; position: absolute; right: -60px; top: -60px;
      width: 220px; height: 220px; border-radius: 50%;
      background: radial-gradient(circle,
        color-mix(in oklab, var(--accent) 45%, transparent) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-silhouette {
      width: 120px; height: 170px; flex-shrink: 0;
      color: var(--accent); position: relative; z-index: 1;
    }
    .hero-copy { flex: 1; position: relative; z-index: 1; min-width: 0; }
    .hero-label {
      font-size: 11px; letter-spacing: 0.2em; color: var(--muted);
      text-transform: uppercase; font-weight: 700;
    }
    .hero-muscles { margin-top: 4px; font-size: 16px; font-weight: 700; line-height: 1.35; }

    /* Exercise list */
    .exercises { margin-top: 20px; }
    .exercise {
      padding: 14px 0 16px;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 56px 1fr;
      grid-template-rows: auto auto;
      grid-template-areas:
        "icon head"
        "sets sets";
      column-gap: 14px; row-gap: 12px;
    }
    .exercise:first-of-type { border-top: none; padding-top: 6px; }
    .ex-icon {
      grid-area: icon;
      width: 56px; height: 72px;
      color: var(--accent);
      display: grid; place-items: center;
    }
    .ex-icon svg { width: 100%; height: 100%; }
    .ex-head { grid-area: head; min-width: 0; align-self: center; }
    .ex-name { font-size: 16px; font-weight: 700; margin: 2px 0 4px; letter-spacing: 0.01em; }
    .ex-prescription {
      font-size: 12px; color: var(--muted);
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .sets { grid-area: sets; display: flex; gap: 12px; flex-wrap: wrap; }

    .set {
      position: relative;
      width: 48px; height: 48px;
      border-radius: 14px;
      border: 1.5px solid var(--border-hi);
      background: var(--bg-raised);
      color: var(--muted);
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      display: grid; place-items: center;
      transition: background 120ms ease, border-color 120ms ease, color 120ms ease, transform 80ms ease;
      overflow: hidden;
    }
    .set span.num { position: relative; z-index: 1; }
    .set:active { transform: scale(0.9); }
    .set.done {
      background: var(--accent);
      border-color: var(--accent);
      color: #04201a;
      box-shadow: 0 0 16px -2px color-mix(in oklab, var(--accent) 50%, transparent);
    }
    .set .pulse {
      position: absolute; inset: 0; border-radius: inherit;
      pointer-events: none; background: currentColor; opacity: 0;
    }
    .set.pulse-go .pulse { animation: pulse 420ms ease-out; }
    @keyframes pulse {
      0%   { opacity: 0.4; transform: scale(0.6); }
      100% { opacity: 0;   transform: scale(1.7); }
    }

    .detail-hero.complete { animation: heroGlow 1200ms ease-out; }
    @keyframes heroGlow {
      0%   { box-shadow: 0 0 0 0 color-mix(in oklab, var(--accent) 60%, transparent); }
      50%  { box-shadow: 0 0 40px 8px color-mix(in oklab, var(--accent) 50%, transparent); }
      100% { box-shadow: 0 0 0 0 transparent; }
    }

    .reset-bar {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(5,5,5,0.97) 65%, rgba(5,5,5,0));
      display: flex; justify-content: center;
      pointer-events: none; z-index: 5;
    }
    .reset-btn {
      pointer-events: auto;
      background: var(--panel); color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 11px 24px;
      font: inherit; font-size: 13px; font-weight: 600; letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease;
    }
    .reset-btn:active { background: var(--panel-hi); color: var(--text); }

    /* ---------- Silhouette styling ---------- */
    .silhouette .body-base {
      fill: var(--body-base);
      stroke: var(--body-stroke);
      stroke-width: 1.2;
    }
    .silhouette [data-muscle] {
      fill: var(--muscle-dim);
      transition: fill 220ms ease;
    }
    .silhouette [data-muscle].active {
      fill: currentColor;
    }
  </style>
</head>
<body>

  <div class="ambient dim" id="ambient"></div>

  <div class="app">
    <!-- Home -->
    <section id="home" class="screen">
      <header class="app-header">
        <div class="app-title">Workout</div>
        <div id="last-session" class="last-session hidden"></div>
      </header>
      <div class="tiles" id="tiles"></div>
    </section>

    <!-- Detail -->
    <section id="detail" class="screen hidden">
      <header class="detail-header">
        <button class="back-btn" id="back-btn" aria-label="Back">‹</button>
        <div class="detail-title" id="detail-title"></div>
        <div class="progress-ring" id="progress-ring">
          <svg viewBox="0 0 52 52">
            <circle class="track" cx="26" cy="26" r="22" fill="none" stroke-width="4"/>
            <circle class="fill"  cx="26" cy="26" r="22" fill="none" stroke-width="4"
                    stroke-linecap="round" stroke-dasharray="138.23" stroke-dashoffset="138.23"/>
          </svg>
          <div class="label" id="progress-label">0/0</div>
        </div>
      </header>

      <div class="detail-hero" id="detail-hero">
        <svg class="hero-silhouette silhouette" id="hero-silhouette" viewBox="0 0 200 300">
          <use href="#body-front"/>
        </svg>
        <div class="hero-copy">
          <div class="hero-label">Target muscles</div>
          <div class="hero-muscles" id="hero-muscles"></div>
        </div>
      </div>

      <div class="exercises" id="exercises"></div>

      <div class="reset-bar">
        <button class="reset-btn" id="reset-btn">Reset today</button>
      </div>
    </section>
  </div>

  <script type="module">
    import { WORKOUTS, WORKOUT_ORDER } from "./workouts.js";

    // ---------- Persistence ----------
    const PREFIX = "workout:";
    const todayKey = () => {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${PREFIX}${y}-${m}-${day}`;
    };
    const emptyState = (id) =>
      WORKOUTS[id].exercises.map((ex) => Array(ex.sets).fill(false));

    const loadAndPrune = () => {
      const today = todayKey();
      let lastDay = null, lastId = null, lastTime = 0;
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const k = localStorage.key(i);
        if (!k || !k.startsWith(PREFIX) || k === today) continue;
        try {
          const v = JSON.parse(localStorage.getItem(k) || "{}");
          for (const id of WORKOUT_ORDER) {
            if (v[id] && v[id].some((arr) => arr.some(Boolean))) {
              const t = new Date(k.slice(PREFIX.length) + "T00:00:00").getTime();
              if (t > lastTime) { lastTime = t; lastDay = k.slice(PREFIX.length); lastId = id; }
            }
          }
        } catch {}
        localStorage.removeItem(k);
      }
      let todayState = {};
      try { todayState = JSON.parse(localStorage.getItem(today) || "{}"); } catch {}
      return { todayState, lastDay, lastId };
    };
    const saveToday = (state) => localStorage.setItem(todayKey(), JSON.stringify(state));

    let { todayState, lastDay, lastId } = loadAndPrune();

    const getWorkoutState = (id) => {
      if (!todayState[id]) todayState[id] = emptyState(id);
      const expected = WORKOUTS[id].exercises;
      if (
        todayState[id].length !== expected.length ||
        todayState[id].some((arr, i) => arr.length !== expected[i].sets)
      ) {
        todayState[id] = emptyState(id);
      }
      return todayState[id];
    };

    // ---------- Labels ----------
    const MUSCLE_LABELS = {
      chest: "Chest",
      "delts-front": "Front delts",
      "delts-side": "Side delts",
      "delts-rear": "Rear delts",
      triceps: "Triceps",
      biceps: "Biceps",
      forearms: "Forearms",
      "back-upper": "Upper back",
      "back-lats": "Lats",
      "back-lower": "Lower back",
      hams: "Hamstrings",
      quads: "Quads",
      glutes: "Glutes",
      calves: "Calves",
      abs: "Abs",
      obliques: "Obliques",
    };

    // ---------- DOM ----------
    const $ = (s) => document.querySelector(s);
    const home = $("#home");
    const detail = $("#detail");
    const tilesEl = $("#tiles");
    const detailTitle = $("#detail-title");
    const exercisesEl = $("#exercises");
    const backBtn = $("#back-btn");
    const resetBtn = $("#reset-btn");
    const lastSessionEl = $("#last-session");
    const ambient = $("#ambient");
    const hero = $("#detail-hero");
    const heroMuscles = $("#hero-muscles");
    const heroSilhouette = $("#hero-silhouette");
    const progressRing = $("#progress-ring");
    const progressFill = progressRing.querySelector(".fill");
    const progressLabel = $("#progress-label");
    const RING_CIRCUMFERENCE = 2 * Math.PI * 22;

    // Build a small silhouette SVG element showing a subset of muscles highlighted.
    // view: "front" | "back". muscles: array of muscle IDs. cls: class string.
    const buildSilhouette = (view, muscles, cls) => {
      const sym = view === "back" ? "#body-back" : "#body-front";
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("class", `silhouette ${cls || ""}`);
      svg.setAttribute("viewBox", "0 0 200 300");
      svg.innerHTML = `<use href="${sym}"/>`;
      // Find the resolved muscle regions via a temporary instance — easier: clone markup.
      // Simpler approach: wrap a direct inline copy so we can tag .active classes.
      // (use-shadow elements can't be styled by classname on inner nodes reliably across browsers).
      // So for per-instance highlighting, we embed the body markup directly instead of <use>.
      return svg;
    };

    // Because <use> shadow-DOM cannot have its inner nodes individually class-toggled in all browsers,
    // we inline-clone the <symbol> body for each instance. Helper:
    const getSymbolInner = (() => {
      const cache = {};
      return (id) => {
        if (cache[id]) return cache[id];
        const sym = document.getElementById(id);
        cache[id] = sym ? sym.innerHTML : "";
        return cache[id];
      };
    })();

    const renderSilhouette = (el, view, muscles) => {
      const id = view === "back" ? "body-back" : "body-front";
      el.innerHTML = getSymbolInner(id);
      // mark active
      const set = new Set(muscles || []);
      el.querySelectorAll("[data-muscle]").forEach((node) => {
        if (set.has(node.getAttribute("data-muscle"))) node.classList.add("active");
        else node.classList.remove("active");
      });
    };

    // ---------- Home ----------
    const renderHome = () => {
      tilesEl.innerHTML = "";
      for (const id of WORKOUT_ORDER) {
        const w = WORKOUTS[id];
        const btn = document.createElement("button");
        btn.className = "tile";
        btn.style.setProperty("--tile-accent", w.accent);
        btn.innerHTML = `
          <svg class="tile-silhouette silhouette" viewBox="0 0 200 300" aria-hidden="true"></svg>
          <div class="tile-copy">
            <div class="tile-name"></div>
            <div class="tile-meta"></div>
          </div>
          <div class="tile-arrow">›</div>
        `;
        btn.querySelector(".tile-name").textContent = w.title;
        btn.querySelector(".tile-meta").textContent = `${w.exercises.length} exercises`;
        renderSilhouette(btn.querySelector(".tile-silhouette"), w.view, w.muscles);
        btn.addEventListener("click", () => openWorkout(id, true));
        tilesEl.appendChild(btn);
      }

      if (lastDay && lastId) {
        lastSessionEl.innerHTML = `<span class="dot" style="color:${WORKOUTS[lastId].accent}"></span>Last: ${WORKOUTS[lastId].title} · ${humanAgo(lastDay)}`;
        lastSessionEl.classList.remove("hidden");
      } else {
        lastSessionEl.classList.add("hidden");
      }
    };

    const humanAgo = (dayStr) => {
      const days = Math.floor((Date.now() - new Date(dayStr + "T00:00:00").getTime()) / 86400000);
      if (days <= 0) return "today";
      if (days === 1) return "yesterday";
      if (days < 7) return `${days}d ago`;
      const weeks = Math.floor(days / 7);
      return weeks === 1 ? "1wk ago" : `${weeks}wk ago`;
    };

    // ---------- Detail ----------
    let currentId = null;
    let wasComplete = false;

    const openWorkout = (id, pushHistory) => {
      currentId = id;
      const w = WORKOUTS[id];

      document.documentElement.style.setProperty("--accent", w.accent);
      ambient.classList.remove("dim");

      detailTitle.textContent = w.title;

      // Hero silhouette — workout-level target
      renderSilhouette(heroSilhouette, w.view, w.muscles);
      heroMuscles.textContent = w.muscles.map((m) => MUSCLE_LABELS[m] || m).join(" · ");

      // Exercises
      exercisesEl.innerHTML = "";
      const state = getWorkoutState(id);

      w.exercises.forEach((ex, exIdx) => {
        const exEl = document.createElement("div");
        exEl.className = "exercise";
        exEl.innerHTML = `
          <div class="ex-icon">
            <svg class="silhouette" viewBox="0 0 200 300" aria-hidden="true"></svg>
          </div>
          <div class="ex-head">
            <div class="ex-name"></div>
            <div class="ex-prescription"></div>
          </div>
          <div class="sets"></div>
        `;
        exEl.querySelector(".ex-name").textContent = ex.name;
        exEl.querySelector(".ex-prescription").textContent = `${ex.sets} × ${ex.reps}`;
        renderSilhouette(exEl.querySelector(".ex-icon svg"), ex.view || w.view, ex.primary);

        const setsEl = exEl.querySelector(".sets");
        for (let s = 0; s < ex.sets; s++) {
          const b = document.createElement("button");
          b.className = "set" + (state[exIdx][s] ? " done" : "");
          b.innerHTML = `<span class="num">${s + 1}</span><span class="pulse"></span>`;
          b.setAttribute("aria-label", `Set ${s + 1}`);
          b.addEventListener("click", () => {
            state[exIdx][s] = !state[exIdx][s];
            b.classList.toggle("done", state[exIdx][s]);
            b.classList.remove("pulse-go");
            void b.offsetWidth;
            b.classList.add("pulse-go");
            saveToday(todayState);
            updateProgress(id);
          });
          setsEl.appendChild(b);
        }
        exercisesEl.appendChild(exEl);
      });

      wasComplete = false;
      updateProgress(id);

      home.classList.add("hidden");
      detail.classList.remove("hidden");
      window.scrollTo(0, 0);

      if (pushHistory) history.pushState({ screen: "detail", id }, "", `#${id}`);
    };

    const goHome = (pushHistory) => {
      currentId = null;
      detail.classList.add("hidden");
      home.classList.remove("hidden");
      document.documentElement.style.setProperty("--accent", "#10b981");
      ambient.classList.add("dim");
      renderHome();
      if (pushHistory) history.pushState({ screen: "home" }, "", "#");
    };

    const updateProgress = (id) => {
      const state = getWorkoutState(id);
      const total = state.reduce((a, b) => a + b.length, 0);
      const done  = state.reduce((a, b) => a + b.filter(Boolean).length, 0);
      progressLabel.textContent = `${done}/${total}`;
      const pct = total === 0 ? 0 : done / total;
      progressFill.style.strokeDashoffset = String(RING_CIRCUMFERENCE * (1 - pct));
      const complete = total > 0 && done === total;
      progressRing.classList.toggle("complete", complete);
      if (complete && !wasComplete) {
        hero.classList.remove("complete");
        void hero.offsetWidth;
        hero.classList.add("complete");
      }
      wasComplete = complete;
    };

    // ---------- Wiring ----------
    backBtn.addEventListener("click", () => {
      if (history.state && history.state.screen === "detail") history.back();
      else goHome(true);
    });
    resetBtn.addEventListener("click", () => {
      if (!currentId) return;
      if (!confirm(`Reset all checked sets for ${WORKOUTS[currentId].title}?`)) return;
      todayState[currentId] = emptyState(currentId);
      saveToday(todayState);
      openWorkout(currentId, false);
    });
    window.addEventListener("popstate", (e) => {
      const st = e.state;
      if (st && st.screen === "detail" && WORKOUTS[st.id]) openWorkout(st.id, false);
      else goHome(false);
    });

    // ---------- Boot ----------
    const bootId = location.hash.replace(/^#/, "");
    renderHome();
    if (WORKOUTS[bootId]) {
      openWorkout(bootId, false);
      history.replaceState({ screen: "detail", id: bootId }, "", `#${bootId}`);
    } else {
      history.replaceState({ screen: "home" }, "", location.pathname);
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
